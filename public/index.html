<!DOCTYPE html>
<html lang="es" prefix="og: https://ogp.me/ns#">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Primario ───────────────────────────────────────────── -->
  <title>Theos — Teólogo Católico con IA</title>
  <meta name="description" content="Theos es un teólogo católico impulsado por inteligencia artificial. Resuelve tus dudas sobre fe, doctrina, Biblia, sacramentos y tradición católica en español." />
  <meta name="keywords" content="teólogo católico, inteligencia artificial, catolicismo, fe católica, doctrina católica, Biblia, sacramentos, teología, chatbot católico" />
  <meta name="author" content="Theos" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://viveros.click/" />

  <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn…) ─────────── -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://viveros.click/" />
  <meta property="og:title"       content="Theos — Teólogo Católico con IA" />
  <meta property="og:description" content="Resuelve tus dudas sobre fe, doctrina, Biblia y tradición católica con un teólogo impulsado por IA. Disponible en español." />
  <meta property="og:image"       content="https://viveros.click/og-image.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale"      content="es_ES" />
  <meta property="og:site_name"   content="Theos" />

  <!-- ── Twitter / X Card ───────────────────────────────────── -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Theos — Teólogo Católico con IA" />
  <meta name="twitter:description" content="Resuelve tus dudas sobre fe, doctrina y Biblia con un teólogo católico impulsado por IA." />
  <meta name="twitter:image"       content="https://viveros.click/og-image.png" />

  <!-- ── Tema y PWA ─────────────────────────────────────────── -->
  <meta name="theme-color" content="#17140f" />
  <meta name="color-scheme" content="dark light" />
  <meta name="application-name" content="Theos" />

  <!-- Apply saved theme before paint to avoid a flash (dark is the default) -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theos-theme');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) {}
    })();
  </script>

  <!-- ── JSON-LD: WebApplication ───────────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Theos",
    "alternateName": "Theos Teólogo Católico",
    "url": "https://viveros.click/",
    "description": "Teólogo católico impulsado por inteligencia artificial que responde dudas sobre fe, doctrina, Biblia, sacramentos y tradición católica en español.",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "All",
    "inLanguage": "es",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "audience": {
      "@type": "Audience",
      "audienceType": "Católicos hispanohablantes"
    }
  }
  </script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Settings overlay (click to close panel) -->
  <div id="settings-overlay" aria-hidden="true"></div>

  <!-- Report modal -->
  <div id="report-overlay" aria-hidden="true"></div>
  <section id="report-modal" role="dialog" aria-modal="true" aria-labelledby="report-title">
    <div class="report-header">
      <h2 id="report-title">Reportar respuesta</h2>
      <button id="report-close-btn" aria-label="Cerrar reporte">&times;</button>
    </div>

    <label for="report-reason">Motivo</label>
    <select id="report-reason">
      <option value="doctrinal_error">Error doctrinal grave</option>
      <option value="offensive">Contenido ofensivo o discriminatorio</option>
      <option value="unsafe_advice">Consejo peligroso</option>
      <option value="false_citation">Cita falsa o no verificable</option>
      <option value="other">Otro</option>
    </select>

    <label for="report-comment">Comentario opcional</label>
    <textarea id="report-comment" rows="4" maxlength="800" placeholder="Añade contexto si ayuda a revisar el problema"></textarea>

    <div class="report-actions">
      <button id="report-cancel-btn" class="btn-secondary">Cancelar</button>
      <button id="report-submit-btn">Enviar reporte</button>
    </div>
    <p id="report-status" role="status"></p>
  </section>

  <!-- Settings panel (slide-in drawer) -->
  <aside id="settings-panel" role="complementary" aria-label="Configuración">
    <div class="settings-header">
      <h2>Configuración</h2>
      <button id="settings-close-btn" aria-label="Cerrar configuración">&times;</button>
    </div>

    <label for="provider-select">Proveedor</label>
    <select id="provider-select">
      <option value="openai">OpenAI (ChatGPT)</option>
      <option value="anthropic">Anthropic (Claude)</option>
      <option value="gemini">Google (Gemini)</option>
      <option value="mistral">Mistral AI</option>
    </select>

    <label id="api-key-label" for="api-key-input">API Key</label>
    <input
      id="api-key-input"
      type="password"
      placeholder="sk-..."
      autocomplete="off"
      spellcheck="false"
    />
    <p class="settings-hint">
      La clave se guarda solo en <code>sessionStorage</code> (se borra al cerrar la pestaña).
      Nunca se envía a ningún servidor propio.
    </p>

    <label for="model-select">Modelo</label>
    <select id="model-select">
      <!-- Opciones cargadas dinámicamente por app.js según el proveedor -->
    </select>

    <div class="settings-divider"></div>

    <button id="clear-btn" class="btn-secondary">Borrar historial</button>

    <div id="proxy-status" class="proxy-status"></div>
  </aside>

  <!-- App shell -->
  <div id="app">

    <header id="app-header">
      <div class="header-inner">
        <div class="header-title">
          <span class="header-icon" aria-hidden="true">✝</span>
          <h1>Theos</h1>
          <span class="header-subtitle">Teólogo Católico</span>
        </div>
        <div class="header-actions">
        <button id="theme-toggle-btn" class="theme-toggle" aria-label="Cambiar tema" title="Cambiar tema claro/oscuro">
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <a href="/marco-referencia" class="ref-link-btn" aria-label="Marco de referencia" title="Fuentes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </a>
        <button id="settings-btn" aria-label="Abrir configuración" title="Configuración">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        </div>
      </div>
    </header>

    <!-- Message list -->
    <main id="chat-container" role="log" aria-live="polite" aria-label="Conversación">
      <div id="messages"></div>

      <!-- Typing indicator -->
      <div id="typing-indicator" aria-label="El teólogo está escribiendo" role="status">
        <div class="bubble typing-bubble">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </main>

    <!-- Input area -->
    <footer id="input-area">
      <div class="input-inner">
        <textarea
          id="user-input"
          placeholder="Escribe tu pregunta… (Enter para enviar, Shift+Enter para nueva línea)"
          rows="1"
          aria-label="Mensaje"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <button id="send-btn" aria-label="Enviar mensaje" title="Enviar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p id="input-hint">
        <kbd>Enter</kbd> enviar &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> nueva línea
      </p>
    </footer>

  </div><!-- /#app -->

  <!-- Legal footer -->
  <nav id="legal-footer" aria-label="Páginas legales">
    <a href="/marco-referencia">Fuentes</a>
    <span aria-hidden="true">·</span>
    <a href="/aviso-privacidad">Privacidad</a>
    <span aria-hidden="true">·</span>
    <a href="/terminos-condiciones">Términos</a>
  </nav>

  <!-- Dependencies (CDN, no build step) — pinned + Subresource Integrity -->
  <script
    src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
    integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"
    integrity="sha384-XQqX/4yiUGu+oyr87jvWzRuqBUK/adrY0DunhL+tID9m/9dwSpV8h9Fk/Sg6ifVQ"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <!-- Theme toggle (independent of app.js) -->
  <script>
    (function () {
      var btn = document.getElementById('theme-toggle-btn');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var isLight = document.documentElement.getAttribute('data-theme') === 'light';
        if (isLight) {
          document.documentElement.removeAttribute('data-theme');
          try { localStorage.setItem('theos-theme', 'dark'); } catch (e) {}
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          try { localStorage.setItem('theos-theme', 'light'); } catch (e) {}
        }
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', isLight ? '#17140f' : '#f9f7f4');
      });
    })();
  </script>

  <script type="module" src="app.js"></script>

</body>
</html>
